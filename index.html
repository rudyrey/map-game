<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map Quiz</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            background: #1a1a2e;
            color: white;
            flex-wrap: nowrap;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        #hamburger {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 8px 6px;
            border-radius: 6px;
            transition: background 0.2s;
            flex-shrink: 0;
        }

        #hamburger:hover { background: rgba(255,255,255,0.1); }

        #hamburger span {
            display: block;
            width: 18px;
            height: 2px;
            background: rgba(255,255,255,0.8);
            border-radius: 1px;
        }

        #menu-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            z-index: 199;
        }

        #menu-overlay.open { display: block; }

        #menu-drawer {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background: #1a1a2e;
            z-index: 200;
            transition: left 0.3s;
            padding: 24px 16px;
            box-shadow: 4px 0 20px rgba(0,0,0,0.3);
            overflow-y: auto;
            box-sizing: border-box;
        }

        #menu-drawer.open { left: 0; }

        #menu-drawer h2 {
            color: white;
            font-size: 20px;
            margin-bottom: 20px;
            padding: 0 8px;
        }

        .menu-item {
            display: block;
            padding: 12px 16px;
            color: #bdc3c7;
            font-size: 17px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            margin-bottom: 4px;
        }

        .menu-item:hover { background: rgba(255,255,255,0.1); color: white; }
        .menu-item.active { background: #3498db; color: white; font-weight: bold; }

        .menu-category {
            padding: 12px 16px 4px;
            color: #7f8c8d;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 8px;
        }

        #guess-input {
            flex: 1;
            min-width: 180px;
            padding: 8px 14px;
            font-size: 15px;
            font-family: inherit;
            border: 1.5px solid rgba(255,255,255,0.25);
            border-radius: 6px;
            outline: none;
            background: rgba(255,255,255,0.95);
            color: #1a1a2e;
            transition: border-color 0.3s, background 0.3s, box-shadow 0.3s;
        }

        #guess-input:focus {
            border-color: #4fc3f7;
            box-shadow: 0 0 0 2px rgba(79, 195, 247, 0.3);
        }

        #guess-input:disabled {
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.35);
            cursor: not-allowed;
        }

        #guess-input:disabled::placeholder {
            color: rgba(255,255,255,0.25);
        }

        .header-stats {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-shrink: 0;
        }

        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1;
        }

        .stat-label {
            font-size: 9px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.45);
            margin-bottom: 3px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.5px;
        }

        .stat-value.warning { color: #ff6b6b; }

        .header-divider {
            width: 1px;
            height: 28px;
            background: rgba(255,255,255,0.15);
            flex-shrink: 0;
        }

        #start-btn {
            padding: 8px 22px;
            font-size: 13px;
            font-weight: 700;
            font-family: inherit;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: #2ecc71;
            color: white;
            transition: background 0.2s, transform 0.1s;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            flex-shrink: 0;
        }

        #start-btn:disabled { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.4); cursor: default; }
        #start-btn:hover:not(:disabled) { background: #27ae60; transform: translateY(-1px); }
        #start-btn:active:not(:disabled) { transform: translateY(0); }
        #start-btn.stop { background: #e74c3c; }
        #start-btn.stop:hover { background: #c0392b; transform: translateY(-1px); }

        #map-container {
            display: none;
            width: 100%;
            background: #b8d4e3;
            position: relative;
            padding: 16px;
            box-sizing: border-box;
        }

        #reset-view {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 36px;
            height: 36px;
            padding: 0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: rgba(44, 62, 80, 0.8);
            color: white;
            z-index: 10;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #reset-view:hover { background: rgba(44, 62, 80, 1); }

        #reset-view svg {
            width: 16px;
            height: 16px;
            fill: none;
            stroke: white;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        #map-container > svg {
            display: block;
            width: 100%;
            height: auto;
            max-height: calc(100vh - 100px);
        }

        .region {
            fill: #d5dbdb;
            stroke: #888;
            stroke-width: 0.5;
            transition: fill 0.3s;
        }

        .region.guessed {
            fill: #27ae60;
            stroke: #1e8449;
        }

        .region.guessed.flash {
            fill: #2ecc71;
            filter: drop-shadow(0 0 6px rgba(46, 204, 113, 0.8));
        }

        .region.excluded {
            fill: #eee;
            stroke: #bbb;
        }

        .region.missed-hover {
            fill: #e74c3c;
            stroke: #c0392b;
            cursor: pointer;
        }

        .region-tooltip {
            position: absolute;
            background: rgba(44, 62, 80, 0.9);
            color: white;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 13px;
            pointer-events: none;
            z-index: 50;
            white-space: nowrap;
            transform: translate(-50%, -100%);
            margin-top: -8px;
        }

        /* Progress bar */
        #progress-bar-container {
            width: 100%;
            height: 5px;
            background: #dfe6e9;
        }

        #progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #2ecc71, #27ae60);
            transition: width 0.4s ease;
            border-radius: 0 2px 2px 0;
        }

        /* Shake animation */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            15% { transform: translateX(-6px); }
            30% { transform: translateX(6px); }
            45% { transform: translateX(-4px); }
            60% { transform: translateX(4px); }
            75% { transform: translateX(-2px); }
            90% { transform: translateX(2px); }
        }

        #guess-input.shake {
            animation: shake 0.4s ease;
            border-color: #e74c3c !important;
            background: #fde8e8 !important;
        }

        /* Confetti canvas */
        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
        }

        #guessed-section {
            padding: 12px 24px 24px;
        }

        #guessed-section h3 {
            color: #2c3e50;
            margin-bottom: 8px;
            display: none;
        }

        #guessed-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 4px 16px;
        }

        .guessed-name {
            padding: 3px 8px;
            font-size: 14px;
            color: #2c3e50;
            border-left: 3px solid #27ae60;
            animation: fadeIn 0.3s;
        }

        #missed-section {
            padding: 0 24px 24px;
            display: none;
        }

        #missed-section h3 {
            color: #e74c3c;
            margin-bottom: 8px;
        }

        #missed-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 4px 16px;
        }

        .missed-name {
            padding: 3px 8px;
            font-size: 14px;
            color: #7f8c8d;
            border-left: 3px solid #e74c3c;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-8px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: white;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal h2 { margin-bottom: 8px; color: #2c3e50; font-size: 28px; }
        .modal .final-score { font-size: 56px; font-weight: bold; color: #27ae60; margin: 16px 0; }
        .modal .modal-message { color: #7f8c8d; margin-bottom: 16px; font-size: 18px; }

        .modal button {
            padding: 12px 36px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #3498db;
            color: white;
            transition: background 0.2s;
        }

        .modal button:hover { background: #2980b9; }

        #name-entry {
            display: none;
            margin-bottom: 16px;
        }

        #name-entry p {
            color: #f39c12;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 16px;
        }

        #name-entry .name-row {
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        #name-input {
            padding: 8px 12px;
            font-size: 16px;
            border: 2px solid #3498db;
            border-radius: 8px;
            outline: none;
            width: 180px;
        }

        #save-btn {
            padding: 8px 20px;
            background: #f39c12;
        }

        #save-btn:hover { background: #e67e22; }

        .leaderboard {
            margin: 16px 0;
            text-align: left;
        }

        .leaderboard h3 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 8px;
            font-size: 16px;
        }

        .leaderboard table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .leaderboard th {
            background: #2c3e50;
            color: white;
            padding: 6px 10px;
            text-align: left;
        }

        .leaderboard th:first-child { border-radius: 6px 0 0 0; }
        .leaderboard th:last-child { border-radius: 0 6px 0 0; text-align: right; }
        .leaderboard th:nth-child(3) { text-align: right; }

        .leaderboard td {
            padding: 5px 10px;
            border-bottom: 1px solid #ecf0f1;
        }

        .leaderboard td:nth-child(3),
        .leaderboard td:last-child { text-align: right; }

        .leaderboard tr.highlight td {
            background: #fef9e7;
            font-weight: bold;
        }

        .leaderboard .empty-msg {
            text-align: center;
            color: #bdc3c7;
            padding: 12px;
            font-style: italic;
        }

        /* ── Mobile Responsive ── */
        @media (max-width: 600px) {
            .header {
                flex-wrap: wrap;
                gap: 8px;
                padding: 8px 12px;
            }

            #guess-input {
                order: 2;
                min-width: 0;
                width: 100%;
                flex-basis: 100%;
                font-size: 16px; /* prevents iOS zoom on focus */
            }

            .header-stats {
                gap: 10px;
            }

            .stat-value {
                font-size: 15px;
            }

            .header-divider {
                display: none;
            }

            #start-btn {
                padding: 6px 16px;
                font-size: 12px;
            }

            #hamburger {
                padding: 10px 8px;
            }

            #menu-drawer {
                width: min(280px, 85vw);
                left: calc(-1 * min(280px, 85vw));
            }

            #map-container {
                padding: 8px;
            }

            #map-container > svg {
                max-height: calc(100vh - 120px);
            }

            #reset-view {
                width: 30px;
                height: 30px;
                top: 6px;
                right: 6px;
            }

            #reset-view svg {
                width: 14px;
                height: 14px;
            }

            .modal {
                padding: 20px;
                width: 95%;
            }

            .modal h2 {
                font-size: 22px;
            }

            .modal .final-score {
                font-size: 40px;
                margin: 12px 0;
            }

            .modal .modal-message {
                font-size: 15px;
            }

            #name-input {
                width: 100%;
            }

            #name-entry .name-row {
                flex-direction: column;
                gap: 4px;
            }

            #name-entry .name-row button {
                width: 100%;
            }

            .leaderboard table {
                font-size: 12px;
            }

            #guessed-section {
                padding: 12px 16px 16px;
            }

            #missed-section {
                padding: 0 16px 16px;
            }

            #guessed-list,
            #missed-list {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div id="menu-overlay" onclick="closeMenu()"></div>
    <div id="menu-drawer">
        <h2>Choose a Quiz</h2>
        <div class="menu-item active" data-game="world" onclick="switchGame('world')">World</div>

        <div class="menu-item" data-game="oceania" onclick="switchGame('oceania')">Oceania</div>
        <div class="menu-category">Countries</div>
        <div class="menu-item" data-game="australia" onclick="switchGame('australia')">Australia</div>
        <div class="menu-item" data-game="brazil" onclick="switchGame('brazil')">Brazil</div>
        <div class="menu-item" data-game="canada" onclick="switchGame('canada')">Canada</div>
        <div class="menu-item" data-game="china" onclick="switchGame('china')">China</div>
        <div class="menu-item" data-game="france" onclick="switchGame('france')">France</div>
        <div class="menu-item" data-game="germany" onclick="switchGame('germany')">Germany</div>
        <div class="menu-item" data-game="india" onclick="switchGame('india')">India</div>
        <div class="menu-item" data-game="italy" onclick="switchGame('italy')">Italy</div>
        <div class="menu-item" data-game="japan" onclick="switchGame('japan')">Japan</div>
        <div class="menu-item" data-game="mexico" onclick="switchGame('mexico')">Mexico</div>

        <div class="menu-item" data-game="uk" onclick="switchGame('uk')">United Kingdom</div>
        <div class="menu-item" data-game="usa" onclick="switchGame('usa')">USA</div>
    </div>

    <div class="header">
        <button id="hamburger" onclick="toggleMenu()"><span></span><span></span><span></span></button>
        <input type="text" id="guess-input" placeholder="Type a country name and press Enter..." disabled autocomplete="off">
        <div class="header-stats">
            <div class="stat">
                <span class="stat-label">Score</span>
                <span class="stat-value" id="score">0/0</span>
            </div>
            <div class="header-divider"></div>
            <div class="stat">
                <span class="stat-label">Time</span>
                <span class="stat-value" id="timer">20:00</span>
            </div>
        </div>
        <button id="start-btn" disabled>Loading...</button>
    </div>

    <div id="progress-bar-container"><div id="progress-bar"></div></div>

    <canvas id="confetti-canvas"></canvas>

    <div id="map-container">
        <button id="reset-view" onclick="resetZoom()" title="Reset View"><svg viewBox="0 0 24 24"><path d="M3.5 3.5v6h6"/><path d="M3.5 9.5A9 9 0 1 1 5.6 16"/></svg></button>
    </div>

    <div id="guessed-section">
        <h3 id="guessed-header">Guessed Countries</h3>
        <div id="guessed-list"></div>
    </div>

    <div id="missed-section">
        <h3 id="missed-header">Missed Countries</h3>
        <div id="missed-list"></div>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal">
            <h2>Game Over!</h2>
            <div class="final-score" id="final-score">0/0</div>
            <div class="modal-message" id="modal-message"></div>
            <div id="name-entry">
                <p>New top 10 score!</p>
                <div class="name-row">
                    <input type="text" id="name-input" placeholder="Enter your name..." maxlength="20" autocomplete="off">
                    <button id="save-btn" onclick="saveScore()">Save</button>
                </div>
            </div>
            <div class="leaderboard" id="leaderboard"></div>
            <button onclick="closeModal()">Play Again</button>
        </div>
    </div>

                    "54": { name: "West Virginia", aliases: ["wv", "w virginia"] },
                    "55": { name: "Wisconsin", aliases: ["wi", "wis", "wisc"] },
                    "56": { name: "Wyoming", aliases: ["wy", "wyo"] }
                }
            }
        };

        // ── Utilities ──
        function normalize(str) {
            return str.toLowerCase().trim().replace(/[^a-z0-9\s]/g, '').replace(/\s+/g, ' ');
        }

        function padId(id, len) {
            if (!len) return String(id);
            const s = String(id);
            if (s.startsWith('-')) return s;
            return s.padStart(len, '0');
        }

        function getFeatureId(f, game) {
            if (game.idProperty) return String(f.properties[game.idProperty]);
            return padId(f.id, game.idPad);
        }

        // ── Game State ──
        let currentGameKey = 'world';
        let currentGame = GAMES.world;
        let nameLookup = {};
        let totalItems = 0;
        let featureIds = new Set();
        let gameActive = false;
        let guessedIds = new Set();
        let score = 0;
        let timerInterval = null;
        let timeRemaining = 1200;
        let flashTimeout = null;
        let currentTimeTaken = 0;

        // ── DOM ──
        const input = document.getElementById('guess-input');
        const scoreEl = document.getElementById('score');
        const timerEl = document.getElementById('timer');
        const startBtn = document.getElementById('start-btn');
        const mapContainer = document.getElementById('map-container');
        const guessedList = document.getElementById('guessed-list');
        const guessedHeader = document.getElementById('guessed-header');
        const missedSection = document.getElementById('missed-section');
        const missedList = document.getElementById('missed-list');
        const modal = document.getElementById('modal');

        // ── Menu ──
        function toggleMenu() {
            document.getElementById('menu-drawer').classList.toggle('open');
            document.getElementById('menu-overlay').classList.toggle('open');
        }

        function closeMenu() {
            document.getElementById('menu-drawer').classList.remove('open');
            document.getElementById('menu-overlay').classList.remove('open');
        }

        function switchGame(key) {
            if (key === currentGameKey) { closeMenu(); return; }
            if (gameActive) stopGame();
            closeMenu();
            closeModal();
            disableTooltips();
            document.getElementById('progress-bar').style.width = '0%';
            mapContainer.style.display = 'none';
            guessedList.innerHTML = '';
            guessedHeader.style.display = 'none';
            missedSection.style.display = 'none';
            missedList.innerHTML = '';
            startBtn.disabled = true;
            startBtn.textContent = 'Loading...';
            document.querySelectorAll('.menu-item').forEach(el => {
                el.classList.toggle('active', el.dataset.game === key);
            });
            loadGame(key);
        }

        // ── Load Game ──
        async function loadGame(key) {
            currentGameKey = key;
            currentGame = GAMES[key];
            nameLookup = {};
            totalItems = 0;
            featureIds = new Set();

            document.title = `${currentGame.name} Map Quiz`;
            input.placeholder = currentGame.placeholder;
            guessedHeader.textContent = `Guessed ${currentGame.label}`;
            document.getElementById('missed-header').textContent = `Missed ${currentGame.label}`;

            // Remove old map SVG
            const oldSvg = mapContainer.querySelector(':scope > svg');
            if (oldSvg) oldSvg.remove();

            const response = await fetch(currentGame.dataUrl);
            const topoData = await response.json();
            const features = topojson.feature(topoData, topoData.objects[currentGame.objectKey]);

            // Filter features for continent quizzes
            if (currentGame.includeIds) {
                features.features = features.features.filter(f =>
                    currentGame.includeIds.has(getFeatureId(f, currentGame))
                );
            }

            // Filter null-name features (Highcharts data has placeholder geometries)
            if (currentGame.filterNullNames) {
                const np = currentGame.nameProperty || 'name';
                features.features = features.features.filter(f => f.properties[np] != null);
            }

            // Collect feature IDs
            features.features.forEach(f => {
                featureIds.add(getFeatureId(f, currentGame));
            });

            // Build name lookup
            featureIds.forEach(id => {
                if (currentGame.excludedIds.has(id)) return;
                const entry = currentGame.items[id];
                if (entry) {
                    nameLookup[normalize(entry.name)] = id;
                    entry.aliases.forEach(a => { nameLookup[normalize(a)] = id; });
                    totalItems++;
                }
            });

            scoreEl.textContent = `0/${totalItems}`;
            timeRemaining = 1200;
            updateTimer();

            // Render map
            const width = 960;
            const height = currentGame.showOcean ? 500 : 600;
            const pad = currentGame.fitTarget ? 20 : 0;
            const projection = currentGame.makeProjection();

            if (currentGame.fitTarget) {
                projection.fitExtent([[pad, pad], [width - pad, height - pad]], currentGame.fitTarget);
            } else {
                projection.fitSize([width, height], features);
            }

            const path = d3.geoPath(projection);

            const svg = d3.select('#map-container')
                .append('svg')
                .attr('viewBox', `0 0 ${width} ${height}`)
                .attr('preserveAspectRatio', 'xMidYMid meet');

            // Clip path to hide overflow (e.g. Russia's far east in Europe view)
            svg.append('defs').append('clipPath').attr('id', 'map-clip')
                .append('rect').attr('width', width).attr('height', height);

            // Background (ocean sphere for world, plain rect for others)
            if (currentGame.showOcean) {
                // added inside g so it's behind regions
            } else {
                svg.append('rect')
                    .attr('width', width)
                    .attr('height', height)
                    .attr('fill', '#b8d4e3');
            }

            const g = svg.append('g').attr('clip-path', 'url(#map-clip)');

            if (currentGame.showOcean) {
                g.append('path')
                    .datum({ type: "Sphere" })
                    .attr('d', path)
                    .attr('fill', '#b8d4e3')
                    .attr('stroke', '#8aacbf')
                    .attr('stroke-width', 1);
            }

            // Regions
            g.selectAll('.region')
                .data(features.features)
                .join('path')
                .attr('class', d => {
                    const id = getFeatureId(d, currentGame);
                    return currentGame.excludedIds.has(id) ? 'region excluded' : 'region';
                })
                .attr('d', path)
                .attr('data-id', d => getFeatureId(d, currentGame));

            // Borders
            const meshFilter = currentGame.includeIds
                ? (a, b) => a !== b && (
                    currentGame.includeIds.has(getFeatureId(a, currentGame)) ||
                    currentGame.includeIds.has(getFeatureId(b, currentGame)))
                : (a, b) => a !== b;
            g.append('path')
                .datum(topojson.mesh(topoData, topoData.objects[currentGame.objectKey], meshFilter))
                .attr('fill', 'none')
                .attr('stroke', '#888')
                .attr('stroke-width', 0.5)
                .attr('stroke-linejoin', 'round')
                .attr('d', path);

            // Zoom & pan (Ctrl/Cmd+scroll to zoom; regular scroll passes through)
            const zoom = d3.zoom()
                .scaleExtent([1, 12])
                .filter(event => {
                    if (event.type === 'wheel') return event.ctrlKey || event.metaKey;
                    return !event.button;
                })
                .on('zoom', (event) => { g.attr('transform', event.transform); });

            svg.call(zoom);
            window._mapSvg = svg;
            window._mapZoom = zoom;

            mapContainer.style.display = 'block';
            startBtn.disabled = false;
            startBtn.textContent = 'START';
        }

        // ── Game Flow ──
        function startGame() {
            gameActive = true;
            guessedIds.clear();
            score = 0;
            timeRemaining = 1200;

            input.disabled = false;
            input.value = '';
            input.focus();

            startBtn.textContent = 'STOP';
            startBtn.classList.add('stop');

            guessedList.innerHTML = '';
            guessedHeader.style.display = 'none';
            missedSection.style.display = 'none';
            missedList.innerHTML = '';

            d3.selectAll('.region:not(.excluded)').classed('guessed', false);
            disableTooltips();
            updateProgressBar();

            scoreEl.textContent = `0/${totalItems}`;
            updateTimer();

            timerInterval = setInterval(() => {
                timeRemaining--;
                updateTimer();
                if (timeRemaining <= 0) stopGame();
            }, 1000);
        }

        function stopGame() {
            gameActive = false;
            clearInterval(timerInterval);

            input.disabled = true;
            startBtn.textContent = 'START';
            startBtn.classList.remove('stop');

            document.getElementById('final-score').textContent = `${score}/${totalItems}`;
            const pct = totalItems > 0 ? Math.round(score / totalItems * 100) : 0;
            let msg;
            if (pct === 100) msg = 'Perfect score! You are a geography master!';
            else if (pct >= 80) msg = 'Excellent work!';
            else if (pct >= 60) msg = 'Great effort! Keep it up!';
            else if (pct >= 40) msg = 'Good start! Try again to improve!';
            else msg = 'Keep practicing!';
            document.getElementById('modal-message').textContent = msg;

            currentTimeTaken = 1200 - timeRemaining;
            const nameEntry = document.getElementById('name-entry');
            if (score > 0 && qualifiesForLeaderboard(score, currentTimeTaken)) {
                nameEntry.style.display = 'block';
                document.getElementById('name-input').value = '';
            } else {
                nameEntry.style.display = 'none';
            }
            renderLeaderboard(-1);

            modal.classList.add('active');
            if (nameEntry.style.display === 'block') {
                document.getElementById('name-input').focus();
            }

            // Confetti for great scores
            if (pct >= 80) launchConfetti();

            // Enable tooltips on map
            enableTooltips();

            // Missed items
            const missed = [];
            featureIds.forEach(id => {
                if (currentGame.excludedIds.has(id) || guessedIds.has(id)) return;
                const entry = currentGame.items[id];
                if (entry) missed.push(entry.name);
            });
            if (missed.length > 0) {
                missed.sort();
                missed.forEach(name => {
                    const div = document.createElement('div');
                    div.className = 'missed-name';
                    div.textContent = name;
                    missedList.appendChild(div);
                });
                missedSection.style.display = 'block';
            }
        }

        function closeModal() { modal.classList.remove('active'); }

        function resetZoom() {
            if (window._mapSvg && window._mapZoom) {
                window._mapSvg.transition().duration(500).call(window._mapZoom.transform, d3.zoomIdentity);
            }
        }

        // ── Leaderboard ──
        function getLeaderboard() {
            try {
                return JSON.parse(localStorage.getItem(currentGame.leaderboardKey)) || [];
            } catch { return []; }
        }

        function saveLeaderboard(board) {
            localStorage.setItem(currentGame.leaderboardKey, JSON.stringify(board));
        }

        function qualifiesForLeaderboard(items, timeTaken) {
            const board = getLeaderboard();
            if (board.length < 10) return true;
            const worst = board[board.length - 1];
            if (items > worst.countries) return true;
            if (items === worst.countries && timeTaken < worst.timeTaken) return true;
            return false;
        }

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        function renderLeaderboard(highlightIndex) {
            const board = getLeaderboard();
            const container = document.getElementById('leaderboard');
            if (board.length === 0) {
                container.innerHTML = '<h3>Leaderboard</h3><div class="empty-msg">No scores yet</div>';
                return;
            }
            let html = '<h3>Leaderboard</h3><table><tr><th>#</th><th>Name</th><th>Score</th><th>Time</th></tr>';
            board.forEach((entry, i) => {
                const cls = i === highlightIndex ? ' class="highlight"' : '';
                html += `<tr${cls}><td>${i + 1}</td><td>${escapeHtml(entry.name)}</td><td>${entry.countries}/${entry.total}</td><td>${formatTime(entry.timeTaken)}</td></tr>`;
            });
            html += '</table>';
            container.innerHTML = html;
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function saveScore() {
            const nameInput = document.getElementById('name-input');
            const name = nameInput.value.trim() || 'Anonymous';
            const entry = { name, countries: score, total: totalItems, timeTaken: currentTimeTaken };

            const board = getLeaderboard();
            let insertAt = board.findIndex(e =>
                entry.countries > e.countries ||
                (entry.countries === e.countries && entry.timeTaken < e.timeTaken)
            );
            if (insertAt === -1) insertAt = board.length;
            board.splice(insertAt, 0, entry);
            if (board.length > 10) board.length = 10;
            saveLeaderboard(board);

            document.getElementById('name-entry').style.display = 'none';
            renderLeaderboard(insertAt);
        }

        // ── Input Handling ──
        input.addEventListener('keydown', (e) => {
            if (e.key !== 'Enter') return;
            e.preventDefault();
            if (!gameActive) return;

            const guess = normalize(input.value);
            if (!guess) return;

            const id = nameLookup[guess];
            if (id === undefined) {
                input.classList.remove('shake');
                void input.offsetWidth;
                input.classList.add('shake');
                setTimeout(() => input.classList.remove('shake'), 400);
                return;
            }

            if (guessedIds.has(id)) {
                flashInput('#f39c12');
                input.value = '';
                return;
            }

            guessedIds.add(id);
            score++;

            const regions = d3.selectAll(`.region[data-id="${id}"]`);
            regions.classed('guessed', true).classed('flash', true);
            setTimeout(() => regions.classed('flash', false), 600);
            scoreEl.textContent = `${score}/${totalItems}`;
            updateProgressBar();
            addToGuessedList(currentGame.items[id].name);
            flashInput('#27ae60');
            input.value = '';

            if (score === totalItems) stopGame();
        });

        function flashInput(color) {
            clearTimeout(flashTimeout);
            input.style.borderColor = color;
            input.style.background = color === '#27ae60' ? '#eafaf1' : '#fef9e7';
            flashTimeout = setTimeout(() => {
                input.style.borderColor = '#3498db';
                input.style.background = '';
            }, 300);
        }

        function updateProgressBar() {
            const pct = totalItems > 0 ? (score / totalItems) * 100 : 0;
            document.getElementById('progress-bar').style.width = pct + '%';
        }

        // ── Confetti ──
        function launchConfetti() {
            const canvas = document.getElementById('confetti-canvas');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const ctx = canvas.getContext('2d');
            const colors = ['#e74c3c','#3498db','#2ecc71','#f1c40f','#9b59b6','#e67e22','#1abc9c','#ff6b81'];
            const pieces = [];
            for (let i = 0; i < 150; i++) {
                pieces.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    w: Math.random() * 10 + 5,
                    h: Math.random() * 6 + 3,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    vx: (Math.random() - 0.5) * 4,
                    vy: Math.random() * 3 + 2,
                    rot: Math.random() * Math.PI * 2,
                    rv: (Math.random() - 0.5) * 0.2,
                    opacity: 1
                });
            }
            let frame = 0;
            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let alive = false;
                pieces.forEach(p => {
                    if (p.opacity <= 0) return;
                    alive = true;
                    p.x += p.vx;
                    p.vy += 0.05;
                    p.y += p.vy;
                    p.rot += p.rv;
                    if (frame > 100) p.opacity -= 0.02;
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rot);
                    ctx.globalAlpha = Math.max(0, p.opacity);
                    ctx.fillStyle = p.color;
                    ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
                    ctx.restore();
                });
                frame++;
                if (alive) requestAnimationFrame(draw);
                else ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
            draw();
        }

        // ── Tooltips (after game ends) ──
        let tooltipEl = null;
        function enableTooltips() {
            tooltipEl = document.createElement('div');
            tooltipEl.className = 'region-tooltip';
            tooltipEl.style.display = 'none';
            document.getElementById('map-container').appendChild(tooltipEl);

            d3.selectAll('.region:not(.excluded)').on('mouseenter', function(event) {
                const id = this.getAttribute('data-id');
                const entry = currentGame.items[id];
                if (!entry) return;
                const isGuessed = d3.select(this).classed('guessed');
                if (!isGuessed) d3.select(this).classed('missed-hover', true);
                tooltipEl.textContent = entry.name;
                tooltipEl.style.display = 'block';
            }).on('mousemove', function(event) {
                const container = document.getElementById('map-container');
                const rect = container.getBoundingClientRect();
                tooltipEl.style.left = (event.clientX - rect.left) + 'px';
                tooltipEl.style.top = (event.clientY - rect.top) + 'px';
            }).on('mouseleave', function() {
                d3.select(this).classed('missed-hover', false);
                tooltipEl.style.display = 'none';
            });
        }

        function disableTooltips() {
            if (tooltipEl) { tooltipEl.remove(); tooltipEl = null; }
            d3.selectAll('.region:not(.excluded)').on('mouseenter', null).on('mousemove', null).on('mouseleave', null);
        }

        function addToGuessedList(name) {
            guessedHeader.style.display = 'block';
            const items = [...guessedList.children];
            const div = document.createElement('div');
            div.className = 'guessed-name';
            div.textContent = name;

            const insertBefore = items.find(item => item.textContent.localeCompare(name) > 0);
            if (insertBefore) {
                guessedList.insertBefore(div, insertBefore);
            } else {
                guessedList.appendChild(div);
            }
        }

        function updateTimer() {
            const mins = Math.floor(timeRemaining / 60);
            const secs = timeRemaining % 60;
            timerEl.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
            timerEl.classList.toggle('warning', timeRemaining < 60);
        }

        document.getElementById('name-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') { e.preventDefault(); saveScore(); }
        });

        startBtn.addEventListener('click', () => {
            if (gameActive) stopGame();
            else startGame();
        });

        // ── Init ──
        loadGame('world');
    </script>
